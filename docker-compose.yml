# 印尼智能催收系统 Docker Compose 部署配置
# 本地开发和服务器部署都可以使用
version: '3.8'

services:
  api:
    build: .
    image: coin-collect-api:latest
    container_name: coin-collect-api
    restart: always
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - TZ=Asia/Jakarta
      - ENV=${ENV:-development}
      - DB_URI=${DB_URI:-sqlite:///./data/collection.db}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tmp:/app/tmp
      - huggingface_cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 如果需要单独的数据库服务，可以添加
