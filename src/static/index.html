        .sidebar-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header button {
            padding: 4px 12px;
            background: #334155;
            color: #e2e8f0;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-header button:hover {
            background: #475569;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .session-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            padding: 12px 8px 6px;
        }

        .session-card {
            position: relative;
            padding: 10px 12px;
            margin: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .session-card:hover {
            background: #334155;
        }

        .session-card.active {
            background: #334155;
            border-color: #667eea;
        }

        .session-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .session-card .card-name {
            font-size: 13px;
            font-weight: 500;
            color: #f1f5f9;
        }

        .session-card .card-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .badge-h2 { background: #dcfce7; color: #166534; }
        .badge-h1 { background: #fef3c7; color: #92400e; }
        .badge-s0 { background: #fee2e2; color: #991b1b; }

        .session-card .card-meta {
            font-size: 11px;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }

        .session-card .card-state {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .session-card .status-dot-sm {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .card-delete-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 18px;
            height: 18px;
            padding: 0;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            border-radius: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1;
            opacity: 0.6;
        }

        .session-card:hover .card-delete-btn {
            display: flex;
        }

        .card-delete-btn:hover {
            background: #ef4444;
            color: white;
            opacity: 1;
        }

        /* Inline delete confirm popup */
        .delete-confirm {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #f1f5f9;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .delete-confirm .btn-confirm-yes {
            padding: 3px 10px;
            font-size: 11px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-confirm .btn-confirm-no {
            padding: 3px 10px;
            font-size: 11px;
            background: #334155;
            color: #e2e8f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-confirm .btn-confirm-yes:hover { background: #dc2626; }
        .delete-confirm .btn-confirm-no:hover { background: #475569; }

        .status-dot-sm.active-dot { background: #4ade80; }
        .status-dot-sm.success-dot { background: #22c55e; }
        .status-dot-sm.failed-dot { background: #ef4444; }

        /* ========== Right Main Panel ========== */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            min-width: 0;
        }

        /* Mode Tabs */
        .mode-bar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            gap: 4px;
        }

        .mode-tab {
            padding: 6px 16px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #64748b;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .mode-tab:hover:not(.active) {
            background: #f1f5f9;
        }

        .voice-toggle-btn {
            margin-left: auto;
            padding: 6px 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #64748b;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .voice-toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* Config bar */
        .config-bar {
            padding: 10px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .config-bar.hidden {
            display: none;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .config-group label {
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
        }

        .config-group select,
        .config-group input {
            padding: 6px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background: #f8fafc;
            transition: border-color 0.2s;
        }

        .config-group select:focus,
        .config-group input:focus {
            border-color: #667eea;
        }

        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start-auto {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-start-auto:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-start-auto.running {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-start-auto:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Voice mode buttons */
        .btn-call {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-call:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }

        .btn-call.running {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-hangup {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-hangup:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        /* Voice recording button */
        .btn-record {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        .btn-record:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.5);
        }

        .btn-record.recording {
            background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%);
            animation: pulse-record 1.5s ease-in-out infinite;
        }

        .btn-record:active {
            transform: scale(0.98);
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        .mic-icon {
            font-size: 20px;
        }

        /* Voice status bar */
        .voice-status {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: #fef2f2;
            border-top: 1px solid #fecaca;
            gap: 12px;
        }

        .voice-status.hidden {
            display: none;
        }

        .voice-status-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .voice-rec-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
        }

        .voice-rec-dot.recording {
            animation: blink-dot 0.8s ease-in-out infinite;
        }

        @keyframes blink-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #voiceStatusText {
            font-size: 13px;
            color: #991b1b;
            font-weight: 500;
        }

        .voice-timer {
            font-size: 14px;
            font-weight: 600;
            color: #991b1b;
            font-variant-numeric: tabular-nums;
        }

        /* Voice controls area */
        .voice-controls {
            padding: 12px 16px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        .voice-controls.hidden {
            display: none;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .welcome-message {
            text-align: center;
            color: #64748b;
            padding: 60px 20px;
        }

        .welcome-message h2 {
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .welcome-message p {
            font-size: 13px;
        }

        .message {
            display: flex;
            margin-bottom: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.agent {
            justify-content: flex-start;
        }

        .message.customer {
            justify-content: flex-end;
        }

        .message.system {
            justify-content: center;
        }

        .message-wrapper {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message.agent .message-wrapper {
            align-items: flex-start;
        }

        .message.customer .message-wrapper {
            align-items: flex-end;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.agent .message-bubble {
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .message.customer .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.system .message-bubble {
            background: #f1f5f9;
            color: #64748b;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .message.debug {
            justify-content: center;
            margin: 1px 0;
        }

        .message.debug .message-bubble {
            background: #fffbeb;
            color: #92400e;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Menlo', monospace;
            border-left: 2px solid #f59e0b;
        }

        .message-bubble .original-text {
            /* normal display */
        }

        .message-bubble .translation-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(148, 163, 184, 0.3);
            font-style: italic;
            display: none;
        }

        .message-bubble .translation-text.visible {
            display: block;
        }

        .message.customer .message-bubble .translation-text {
            color: rgba(255, 255, 255, 0.75);
            border-top-color: rgba(255, 255, 255, 0.2);
        }

        .message-actions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .play-btn {
            padding: 2px 8px;
            font-size: 11px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            cursor: pointer;
            color: #475569;
            transition: all 0.15s;
        }

        .play-btn:hover {
            background: #e2e8f0;
        }

        .play-btn.playing {
            background: #667eea;
            color: white;
            border-color: transparent;
        }

        .message-time {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .message-label {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 2px;
            font-weight: 500;
        }

        /* Loading */
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 14px;
            color: #64748b;
            font-size: 13px;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Audio indicator */
        .audio-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #667eea;
            padding: 4px 8px;
            background: #f1f5f9;
            border-radius: 4px;
        }

        .wave {
            display: flex;
            align-items: flex-end;
            gap: 1px;
            height: 12px;
        }

        .wave span {
            width: 2px;
            background: #667eea;
            border-radius: 1px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .wave span:nth-child(1) { height: 6px; animation-delay: 0.0s; }
        .wave span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
        .wave span:nth-child(3) { height: 8px; animation-delay: 0.2s; }
        .wave span:nth-child(4) { height: 12px; animation-delay: 0.3s; }
        .wave span:nth-child(5) { height: 4px; animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.3); }
        }

        /* Result banner */
        .result-banner {
            padding: 12px 16px;
            margin: 12px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            animation: fadeIn 0.3s ease;
        }

        .result-banner.success {
            background: #dcfce7;
            color: #166534;
        }

        .result-banner.failed {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Input area */
        .input-area {
            padding: 14px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-area.hidden {
            display: none;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            min-height: 40px;
            max-height: 80px;
        }

        .input-row textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-row textarea:disabled {
            background: #f8fafc;
            cursor: not-allowed;
        }

        .sim-status {
            padding: 8px 16px;
            font-size: 12px;
            color: #64748b;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: none;
        }

        .sim-status.visible {
            display: block;
        }

        .sim-report {
            margin: 12px 16px;
            padding: 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
        }

        .sim-report h3 {
            font-size: 13px;
            margin-bottom: 6px;
            color: #1e293b;
        }

        .sim-report .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            color: #475569;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-size: 13px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* New session button */
        .btn-new-session {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-new-session:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Panel placeholder */
        .panel-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #64748b;
        }

        .panel-placeholder.hidden {
            display: none;
        }

        .placeholder-content h2 {
            color: #1e293b;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .placeholder-content p {
            font-size: 13px;
        }

        /* Session panel */
        .session-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .session-panel.hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
            .config-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ====== Left Sidebar: Session List ====== -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <div class="coin-logo"></div>
                    <h2>会话列表</h2>
                </div>
                <div style="display:flex; gap:6px;">
                    <button id="newSessionBtn" class="btn-new-session">+ 新建</button>
                    <button id="refreshSessionsBtn" title="刷新">↻</button>
                </div>
            </div>
            <div class="session-list" id="sessionList">
                <div class="session-section-title">进行中</div>
                <div class="empty-state" id="activeEmpty">暂无进行中的会话</div>
                <div class="session-section-title" style="margin-top:12px;">已完成</div>
                <div class="empty-state" id="completedEmpty">暂无已完成的会话</div>
            </div>
        </aside>

        <!-- ====== Right Main Panel ====== -->
        <main class="main-panel">
            <!-- Placeholder when no session is active -->
            <div class="panel-placeholder" id="panelPlaceholder">
                <div class="placeholder-content">
                    <h2>智能催收对话系统</h2>
                    <p>点击左侧「+ 新建」开始对话</p>
                </div>
            </div>

            <!-- Session panel (hidden until "新建" clicked) -->
            <div class="session-panel hidden" id="sessionPanel">
                <!-- Mode bar -->
                <div class="mode-bar" id="modeBar">
                    <button class="mode-tab active" data-mode="manual" id="manualModeTab">文本模式</button>
                    <button class="mode-tab" data-mode="auto" id="autoModeTab">自动模式</button>
                    <button class="mode-tab" data-mode="voice" id="voiceModeTab">语音模式</button>
                    <button class="mode-tab" data-mode="duplex" id="duplexModeTab">双工模式</button>
                </div>

                <!-- Text mode config -->
                <div class="config-bar" id="manualConfig">
                    <div class="config-group">
                        <label for="chatGroup">催收组别</label>
                        <select id="chatGroup">
                            <option value="H2">H2 - 早期</option>
                            <option value="H1">H1 - 中期</option>
                            <option value="S0">S0 - 晚期</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="customerName">客户姓名</label>
                        <input type="text" id="customerName" placeholder="Pak / Bu" value="Pak Budi">
                    </div>
                    <button class="btn btn-primary" id="newChatBtn">开始对话</button>
                </div>

                <!-- Auto mode config -->
                <div class="config-bar hidden" id="autoConfig">
                    <div class="config-group">
                        <label for="simPersona">客户类型</label>
                        <select id="simPersona">
                            <option value="cooperative">合作型</option>
                            <option value="busy">忙碌型</option>
                            <option value="negotiating">协商型</option>
                            <option value="resistant">抗拒型</option>
                            <option value="silent">沉默型</option>
                            <option value="forgetful">健忘型</option>
                            <option value="excuse_master">借口大师</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="simResistance">抗拒等级</label>
                        <select id="simResistance">
                            <option value="very_low">非常低</option>
                            <option value="low">低</option>
                            <option value="medium" selected>中等</option>
                            <option value="high">高</option>
                            <option value="very_high">非常高</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="autoChatGroup">催收组别</label>
                        <select id="autoChatGroup">
                            <option value="H2">H2 - 早期</option>
                            <option value="H1">H1 - 中期</option>
                            <option value="S0">S0 - 晚期</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="autoCustomerName">客户姓名</label>
                        <input type="text" id="autoCustomerName" placeholder="Pak / Bu" value="Pak Budi">
                    </div>
                    <button class="voice-toggle-btn" id="voiceToggleBtn" type="button">🔇 语音播报: 关</button>
                    <button class="btn btn-start-auto" id="autoSimBtn">▶ 开始自动对话</button>
                </div>

                <!-- Voice mode config -->
                <div class="config-bar hidden" id="voiceConfig">
                    <div class="config-group">
                        <label for="voiceChatGroup">催收组别</label>
                        <select id="voiceChatGroup">
                            <option value="H2">H2 - 早期</option>
                            <option value="H1">H1 - 中期</option>
                            <option value="S0">S0 - 晚期</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="voiceCustomerName">客户姓名</label>
                        <input type="text" id="voiceCustomerName" placeholder="Pak / Bu" value="Pak Budi">
                    </div>
                    <button class="btn btn-call" id="startCallBtn">📞 开始通话</button>
                </div>

                <!-- Duplex mode config -->
                <div class="config-bar hidden" id="duplexConfig">
                    <div class="config-group">
                        <label for="duplexChatGroup">催收组别</label>
                        <select id="duplexChatGroup">
                            <option value="H2">H2 - 早期</option>
                            <option value="H1">H1 - 中期</option>
                            <option value="S0">S0 - 晚期</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label for="duplexCustomerName">客户姓名</label>
                        <input type="text" id="duplexCustomerName" placeholder="Pak / Bu" value="Pak Budi">
                    </div>
                    <button class="btn btn-call" id="duplexStartBtn">📞 开始双工通话</button>
                </div>

                <!-- Chat area -->
                <div class="chat-area" id="chatArea">
                    <div class="welcome-message" id="welcomeMessage">
                        <h2>选择模式开始对话</h2>
                        <p>文本模式输入回复，语音模式实时通话，或自动模式观看完整模拟</p>
                    </div>
                </div>

                <!-- Simulation status -->
                <div class="sim-status" id="simStatus">
                    <span id="simStatusText"></span>
                </div>

                <!-- Voice recording status -->
                <div class="voice-status hidden" id="voiceStatus">
                    <div class="voice-status-left">
                        <span class="voice-rec-dot" id="voiceRecDot"></span>
                        <span id="voiceStatusText">准备录音...</span>
                    </div>
                    <div class="voice-timer" id="voiceTimer">00:00</div>
                    <button class="btn btn-hangup" id="hangupBtn">📞 挂断</button>
                </div>

                <!-- Duplex call status -->
                <div class="voice-status hidden" id="duplexStatus">
                    <div class="voice-status-left">
                        <span class="voice-rec-dot" id="duplexDot"></span>
                        <span id="duplexStatusText">等待连接...</span>
                    </div>
                    <div class="voice-timer" id="duplexTimer">00:00</div>
                    <button class="btn btn-hangup" id="duplexHangupBtn">📞 挂断</button>
                </div>

                <!-- Voice recording controls -->
                <div class="voice-controls hidden" id="voiceControls">
                    <button class="btn btn-record" id="recordBtn">
                        <span class="mic-icon">🎤</span>
                        <span id="recordBtnText">按住说话</span>
                    </button>
                </div>

                <!-- Input area (manual mode) -->
                <div class="input-area" id="inputArea">
                    <div class="input-row">
                        <textarea id="messageInput" rows="1" placeholder="请先点击「开始对话」..." disabled></textarea>
                        <button class="btn btn-primary" id="sendBtn" disabled>发送</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js?v=9"></script>
</body>
</html>
