# CI/CD Pipeline — 印尼智能催收系统
name: CI/CD

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_to_test:
        description: '部署到测试服务器'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

env:
  PYTHON_VERSION: '3.10'
  APP_DIR: '/home/ecs-user/limeng/coin-collect'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 阶段 1: 代码检查
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install flake8

      - name: flake8
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E203,W503,E501 --count --show-source --statistics

  # ═══════════════════════════════════════════════════════════════
  # 阶段 2: 单元测试（跳过需 GPU/模型的集成测试）
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: 运行测试（跳过需模型的集成测试）
        run: |
          # 只跑不依赖 GPU/faster_whisper 的测试
          python3 -m pytest tests/ -q --asyncio-mode=auto --tb=short \
            --ignore=tests/test_duplex_integration.py \
            --ignore=tests/test_duplex_pipeline.py \
            --ignore=tests/test_voice_ws_handler.py \
            --ignore=tests/test_sherpa_onnx.py \
            --ignore=tests/test_ws_adapters.py \
            -k "not integration"

  # ═══════════════════════════════════════════════════════════════
  # 阶段 3: 构建 Docker 镜像
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.event.inputs.deploy_to_test == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 镜像标签
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # 阶段 4: 部署到测试环境
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 部署测试环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.event.inputs.deploy_to_test == 'true'
    environment:
      name: test
    steps:
      - name: 部署到测试服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: ${{ secrets.TEST_SERVER_PORT || 22 }}
          script: |
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${REPO}:latest"

            # 登录 GHCR（公开仓库可跳过，私有仓库需要 GH_PAT 带 read:packages）
            if [ -n "${{ secrets.GH_PAT }}" ]; then
              echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi

            echo ">>> 拉取镜像"
            docker pull $IMAGE

            echo ">>> 停止旧容器"
            docker stop coin-collect-api 2>/dev/null || true
            docker rm coin-collect-api 2>/dev/null || true

            echo ">>> 启动新容器"
            docker run -d \
              --name coin-collect-api \
              --restart always \
              -p 8000:8000 \
              -e TZ=Asia/Jakarta \
              -e ENV=test \
              -e DB_URI=sqlite:///app/data/collection.db \
              -e LLM_PROVIDER=${LLM_PROVIDER:-mock} \
              -e OPENAI_API_KEY=${OPENAI_API_KEY:-} \
              -e LLM_API_KEY=${LLM_API_KEY:-} \
              -e HF_HOME=/app/.cache/huggingface \
              -e TRANSFORMERS_CACHE=/app/.cache/huggingface \
              -v $APP_DIR/data:/app/data \
              -v $APP_DIR/logs:/app/logs \
              -v $APP_DIR/cache:/app/.cache/huggingface \
              $IMAGE

            echo ">>> 等待就绪"
            sleep 15
            curl -f http://localhost:8000/health && echo "OK" || echo "HEALTH CHECK FAILED"
            docker logs --tail 20 coin-collect-api
