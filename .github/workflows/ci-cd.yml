# CI/CD Pipeline — 印尼智能催收系统
# CI: lint → test → build(推送到 GHCR)
# CD: 服务器上 Watchtower 自动拉取新镜像
name: CI/CD

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 阶段 1: 代码检查
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install flake8

      - name: flake8（仅告警，不阻断）
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E203,W503,E501 --count --show-source --statistics --exit-zero

  # ═══════════════════════════════════════════════════════════════
  # 阶段 2: 单元测试（跳过需 GPU/模型的集成测试）
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: 运行测试（跳过需模型的集成测试）
        run: |
          python3 -m pytest tests/ -q --asyncio-mode=auto --tb=short \
            --ignore=tests/test_duplex_integration.py \
            --ignore=tests/test_duplex_pipeline.py \
            --ignore=tests/test_voice_ws_handler.py \
            --ignore=tests/test_sherpa_onnx.py \
            --ignore=tests/test_ws_adapters.py \
            -k "not integration"

  # ═══════════════════════════════════════════════════════════════
  # 阶段 3: 构建 Docker 镜像并推送到 GHCR
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 镜像标签
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
